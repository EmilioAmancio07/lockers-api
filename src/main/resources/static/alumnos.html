<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumnos - Lockers UAM</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <img src="/assets/imgs/logo-uam.png" alt="Logo UAM" class="logo-uam">

    <div class="header-titles">
        <h1>Gestión de Lockers UAM</h1>
        <p>Integración de Sistemas - Trimestre 26-I</p>
    </div>

    <nav>
        <a href="/alumnos.html" class="activo">Alumnos</a>
        <a href="/lockers.html">Inventario</a>
        <a href="/asignaciones.html">Asignaciones</a>
    </nav>
</header>

<main>
    <section class="panel">
        <h2>Registrar Nuevo Alumno</h2>
        <form id="form-alumno">
            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="text" id="matricula" placeholder="Ej. 2223012345" pattern="[0-9]{10}" title="Debe contener exactamente 10 dígitos" required>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="Ej. Carlos Martínez" required>
            </div>
            <div class="form-group">
                <label for="correo">Correo Institucional:</label>
                <input type="email" id="correo" placeholder="Ej. carlos.martinez@cua.uam.mx" required>
            </div>
            <div class="form-group">
                <label for="licenciatura">Licenciatura:</label>
                <select id="licenciatura" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="Tecnologías y Sistemas de la Información">Tecnologías y Sistemas de la Información</option>
                    <option value="Diseño">Diseño</option>
                    <option value="Ciencias de la Comunicación">Ciencias de la Comunicación</option>
                    <option value="Derecho">Derecho</option>
                    <option value="Estudios Socioterritoriales">Estudios Socioterritoriales</option>
                    <option value="Humanidades">Humanidades</option>
                    <option value="Ingeniería Biológica">Ingeniería Biológica</option>
                    <option value="Biología Molecular">Biología Molecular</option>
                    <option value="Ingeniería en Computación">Ingeniería en Computación</option>
                    <option value="Matemáticas Aplicadas">Matemáticas Aplicadas</option>
                </select>
            </div>
            <div class="form-group">
                <label for="estatus">Estatus:</label>
                <select id="estatus">
                    <option value="Inscrito">Inscrito</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>
            <button type="submit">Guardar Alumno</button>
        </form>
        <p id="mensaje-form" class="mensaje"></p>
    </section>

    <section class="panel">
        <h2>Alumnos Registrados</h2>
        <p style="margin-bottom: 15px; font-size: 14px; color: #666;">
            Total de registros: <strong style="color: #333;" id="contador-alumnos">0</strong>
        </p>

        <div class="table-fix-head">
            <table id="tabla-alumnos">
                <thead>
                <tr>
                    <th>Matrícula</th>
                    <th>Estatus</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/alumnos.js"></script>
</body>
</html>
